// ─── helpers ──────────────────────────────────────────────────────────────────

function etToIdt(date, etTime) {
  const [h, m] = etTime.split(":").map(Number);
  const base = new Date(`${date}T${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:00Z`);
  const idt  = new Date(base.getTime() + 7 * 3600000);
  return {
    idtDay:  idt.toISOString().slice(0, 10),
    idtTime: `${String(idt.getUTCHours()).padStart(2,"0")}:${String(idt.getUTCMinutes()).padStart(2,"0")}`,
  };
}

function toIso(date, etTime) {
  const [h, m] = etTime.split(":").map(Number);
  const utcH   = h + 4;
  const addDay = utcH >= 24 ? 1 : 0;
  const d      = new Date(`${date}T00:00:00Z`);
  d.setUTCDate(d.getUTCDate() + addDay);
  const pad = n => String(n).padStart(2,"0");
  const fmt = (dt, hour) =>
    `${dt.getUTCFullYear()}${pad(dt.getUTCMonth()+1)}${pad(dt.getUTCDate())}T${pad(hour%24)}${pad(m)}00Z`;
  const end = new Date(d);
  if (utcH % 24 + 2 >= 24) end.setUTCDate(end.getUTCDate() + 1);
  return { startIso: fmt(d, utcH), endIso: fmt(end, utcH + 2) };
}

function safeParam(s) {
  return String(s).replace(/%/g,"%25").replace(/&/g,"%26").replace(/#/g,"%23").replace(/\+/g,"%2B");
}

function makeCalUrl(match) {
  const title = match.group
    ? "🏆 מונדיאל 2026 | " + match.home + " נגד " + match.away + " (בית " + match.group + ")"
    : "🏆 מונדיאל 2026 | " + match.stage + ": " + match.home + " נגד " + match.away;
  const { startIso, endIso } = toIso(match.date, match.etTime);
  return "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    "&text=" + safeParam(title) +
    "&dates=" + startIso + "/" + endIso +
    "&details=" + safeParam("FIFA World Cup 2026 • " + match.venue) +
    "&location=" + safeParam(match.venue);
}

// ─── Standings computation ────────────────────────────────────────────────────
// Given the current scores map, compute group standings
function computeStandings(group, scoresMap, liveMap) {
  const matches = GROUP_STAGE.filter(m => m.group === group);
  const teams = {};

  // collect all teams in the group
  matches.forEach(m => {
    [m.home, m.away].forEach(t => {
      if (!teams[t]) teams[t] = { name:t, mp:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 };
    });
  });

  matches.forEach(m => {
    const scoreStr = scoresMap[m.id] || liveMap[m.id];
    if (!scoreStr) return;
    const [hg, ag] = scoreStr.replace(' LIVE','').split('-').map(Number);
    if (isNaN(hg) || isNaN(ag)) return;
    const home = teams[m.home];
    const away = teams[m.away];
    home.mp++; away.mp++;
    home.gf += hg; home.ga += ag;
    away.gf += ag; away.ga += hg;
    if (hg > ag)      { home.w++; home.pts+=3; away.l++; }
    else if (hg < ag) { away.w++; away.pts+=3; home.l++; }
    else              { home.d++; home.pts+=1; away.d++; away.pts+=1; }
  });

  return Object.values(teams).sort((a,b) =>
    b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga) || b.gf - a.gf
  );
}

        // R32: 8 matches, stacked with R32_SPACE gap

        //   → top offset = MH/2 + R32_SPACE/2  (center of first pair)
        //   → spacing between R16 matches = MH*2 + R32_SPACE*3  (= 50*2 + 8*3 = 124)
        // QF: 2 matches
        //   → top offset = center of first 2 R16 matches
        //   → spacing = 2*(R16_spacing) + MH = 2*124+50 = 298? → let's just compute all positions

        const R32_unit = MH + R32_SPACE; // 58px per R32 match including gap below (except last)
        // R32 total height = 8*MH + 7*R32_SPACE + 2*ROUND_PAD
        const totalH = 8*MH + 7*R32_SPACE + 2*ROUND_PAD; // = 8*50+7*8+2*8 = 400+56+16 = 472

        // Compute vertical center of each R32 match
        const r32Y = (i) => ROUND_PAD + i*R32_unit + MH/2; // center of match i

        // R16 match i covers R32 matches 2i and 2i+1 → center between their centers
        const r16Y = (i) => (r32Y(i*2) + r32Y(i*2+1)) / 2;

        // QF match i covers R16 matches 2i and 2i+1
        const qfY = (i) => (r16Y(i*2) + r16Y(i*2+1)) / 2;

        // SF match 0 covers QF matches 0 and 1
        const sfY = () => (qfY(0) + qfY(1)) / 2;

        // Final = center of totalH
        const finalY = totalH / 2;

        // Column widths
        const CW = {r32:130, conn:14, r16:116, qf:104, sf:96, final:84};

        // Draw a column at absolute positions
        const AbsCol = ({label, items, yFn, colW}) => (
          <div style={{ width:colW, flexShrink:0, position:"relative", height:totalH }}>
            <div style={{ textAlign:"center", fontSize:9.5, fontWeight:700, letterSpacing:.7,
              color:"#8ba3c4", textTransform:"uppercase",
              position:"absolute", top:-18, left:0, right:0 }}>{label}</div>
            {items.map((pair, i) => {
              const cy = yFn(i);
              return (
                <div key={i} style={{ position:"absolute", top: cy - MH/2, left:0, right:0 }}>
                  <MB pair={pair} />
                </div>
              );
            })}
          </div>
        );

        // SVG connector: bracket-style lines between rounds
        // For each pair (2i, 2i+1) in fromYs → draws a bracket meeting at midpoint → connects to toYs[i]
        const ConnSVG = ({fromYs, toYs, w, h, flip}) => {
          const paths = [];
          for (let i = 0; i < fromYs.length; i += 2) {
            const y1 = fromYs[i];       // center of first match in pair
            const y2 = fromYs[i+1];     // center of second match in pair
            const ym = (y1 + y2) / 2;  // midpoint between them
            const yt = toYs[i/2];       // center of destination match
            const x1 = flip ? w : 0;    // start x (side touching previous col)
            const x2 = flip ? 0 : w;    // end x (side touching next col)
            const xm = flip ? w*0.4 : w*0.6; // where vertical bar sits
            // Two horizontal lines from each match center to xm, then vertical, then to next col
            paths.push(
              <g key={i}>
                <line x1={x1} y1={y1} x2={xm} y2={y1} stroke="rgba(255,255,255,.2)" strokeWidth="1.2" />
                <line x1={x1} y1={y2} x2={xm} y2={y2} stroke="rgba(255,255,255,.2)" strokeWidth="1.2" />
                <line x1={xm} y1={y1} x2={xm} y2={y2} stroke="rgba(255,255,255,.2)" strokeWidth="1.2" />
                <line x1={xm} y1={ym} x2={x2} y2={ym} stroke="rgba(255,255,255,.2)" strokeWidth="1.2" />
              </g>
            );
          }
          return <svg width={w} height={h} style={{ flexShrink:0 }}>{paths}</svg>;
        };

        // Final connector (SF → Final)
        const FinalConn = ({fromY, toY, w, h, flip}) => (
          <svg width={w} height={h} style={{ flexShrink:0 }}>
            <path d={`M${flip?w:0},${fromY} H${w/2} V${toY} H${flip?0:w}`}
              fill="none" stroke="rgba(244,196,48,.35)" strokeWidth="1.2" />
          </svg>
        );

        const empties = (n) => Array(n).fill(null);
        const r32Lys = R32L.map((_,i) => r32Y(i));
        const r32Rys = R32R.map((_,i) => r32Y(i));
        const r16Lys = empties(4).map((_,i) => r16Y(i));
        const r16Rys = empties(4).map((_,i) => r16Y(i));
        const qfLys  = empties(2).map((_,i) => qfY(i));
        const qfRys  = empties(2).map((_,i) => qfY(i));
        const sfLy   = sfY();
        const sfRy   = sfY();
        const fY     = finalY;

        return (
          <div style={{ padding:"34px 6px 80px", overflowX:"auto" }}>

            <div style={{ display:"flex", alignItems:"flex-start", minWidth:800 }}>

              {/* LEFT */}
              <AbsCol label="שלב 32" items={R32L} yFn={r32Y} colW={CW.r32} />
              <ConnSVG fromYs={r32Lys} toYs={r16Lys} w={CW.conn} h={totalH} flip={false} />
              <AbsCol label="שמינית גמר" items={empties(4)} yFn={r16Y} colW={CW.r16} />
              <ConnSVG fromYs={r16Lys} toYs={qfLys} w={CW.conn} h={totalH} flip={false} />
              <AbsCol label="רבע גמר" items={empties(2)} yFn={qfY} colW={CW.qf} />
              <ConnSVG fromYs={qfLys} toYs={[sfLy]} w={CW.conn} h={totalH} flip={false} />
              <AbsCol label="חצי גמר" items={empties(1)} yFn={sfY} colW={CW.sf} />
              <FinalConn fromY={sfLy} toY={fY} w={CW.conn} h={totalH} flip={false} />

              {/* FINAL */}
              <div style={{ width: CW.final, flexShrink:0, position:"relative", height:totalH }}>
                <div style={{ position:"absolute", top: fY - 100, left:0, right:0, textAlign:"center" }}>
                  <div style={{ fontSize:16 }}>🏆</div>
                  <div style={{ fontSize:8.5, fontWeight:800, letterSpacing:2, color:"#f4c430", textTransform:"uppercase" }}>גמר</div>
                  <div style={{ fontSize:8.5, color:"#8ba3c4" }}>19/7 · 03:00</div>
                </div>
                <div style={{ position:"absolute", top: fY - 40, left:0, right:0,
                  background:"rgba(244,196,48,.08)", border:"1px solid rgba(244,196,48,.35)", borderRadius:8, padding:"5px" }}>
                  <Slot name={null} />
                  <div style={{ textAlign:"center", fontSize:8, color:"rgba(255,255,255,.2)", margin:"1px 0" }}>נגד</div>
                  <Slot name={null} />
                </div>
                <div style={{ position:"absolute", top: fY + 50, left:0, right:0, textAlign:"center" }}>
                  <div style={{ fontSize:8.5, fontWeight:700, color:"#8ba3c4" }}>מקום 3</div>
                </div>
                <div style={{ position:"absolute", top: fY + 66, left:0, right:0,
                  background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.1)", borderRadius:8, padding:"5px" }}>
                  <Slot name={null} />
                  <div style={{ textAlign:"center", fontSize:8, color:"rgba(255,255,255,.2)", margin:"1px 0" }}>נגד</div>
                  <Slot name={null} />
                </div>
              </div>

              {/* RIGHT */}
              <FinalConn fromY={sfRy} toY={fY} w={CW.conn} h={totalH} flip={true} />
              <AbsCol label="חצי גמר" items={empties(1)} yFn={sfY} colW={CW.sf} />
              <ConnSVG fromYs={qfRys} toYs={[sfRy]} w={CW.conn} h={totalH} flip={true} />
              <AbsCol label="רבע גמר" items={empties(2)} yFn={qfY} colW={CW.qf} />
              <ConnSVG fromYs={r16Rys} toYs={qfRys} w={CW.conn} h={totalH} flip={true} />
              <AbsCol label="שמינית גמר" items={empties(4)} yFn={r16Y} colW={CW.r16} />
              <ConnSVG fromYs={r32Rys} toYs={r16Rys} w={CW.conn} h={totalH} flip={true} />
              <AbsCol label="שלב 32" items={R32R} yFn={r32Y} colW={CW.r32} />

            </div>
          </div>
        );
      })()}

          {/* Group selector */}
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:20 }}>

                <div style={{ display:"grid", gridTemplateColumns:"28px 1fr 36px 28px 28px 28px 52px 36px", gap:0,
                  padding:"10px 14px", borderBottom:"1px solid " + gc + "60",

                      gap:0, padding:"12px 14px", alignItems:"center",

                      background: qualify ? "rgba(52,211,153,.04)" : maybe ? "rgba(251,191,36,.03)" : "transparent" }}>
                      <span style={{ fontSize:15, fontWeight:800, color: qualify ? "#34d399" : maybe ? "#fbbf24" : "#8ba3c4", textAlign:"center" }}>{i+1}</span>
                      <span style={{ fontSize:13, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>

                      <span style={{ textAlign:"center", fontSize:12, color: gd>0?"#34d399":gd<0?"#fc8181":"#c8d6e8" }}>
                        {t.gf}-{t.ga}

                      <span style={{ textAlign:"center", fontSize:15, fontWeight:800, color: gc }}>{t.pts}</span>
                    </div>
                  );
                })}

                {/* Legend */}
                <div style={{ padding:"8px 14px", borderTop:"1px solid rgba(255,255,255,.06)", display:"flex", gap:16, fontSize:10, color:"#8ba3c4" }}>
                  <span style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ width:6,height:6,borderRadius:"50%",background:"#34d399",display:"inline-block" }}/> עולה לשלב נוקאאוט</span>
                  <span style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ width:6,height:6,borderRadius:"50%",background:"#fbbf24",display:"inline-block" }}/> אפשרי (שלישי מוביל)</span>
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ── SCHEDULE VIEW ────────────────────────────────────────────────────── */}
      {view === "schedule" && (
      <>{/* Controls */}
      <div style={{ padding:"16px 16px 0", maxWidth:800, margin:"0 auto" }}>
        <input placeholder="🔍 חפש קבוצה…" value={search} onChange={e => setSearch(e.target.value)}
          style={{ width:"100%", boxSizing:"border-box", background:"rgba(255,255,255,.07)", border:"1px solid rgba(255,255,255,.15)", borderRadius:10, padding:"10px 14px", color:"#e8edf5", fontSize:15, outline:"none", marginBottom:12, direction:"rtl" }} />

        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12 }}>
          <button onClick={() => setFilter("all")} style={fBtn(filter==="all","#3498db")}>כולם</button>
          {"ABCDEFGHIJKL".split("").map(g => (
            <button key={g} onClick={() => setFilter(g)} style={fBtn(filter===g, GROUP_COLORS[g])}>בית {g}</button>
          ))}
        </div>

          <button onClick={() => setShowKnockout(p => !p)} style={fBtn(showKnockout,"#c79200")}>{showKnockout?"✓ ":""} שלבי נוקאאוט</button>
          <div style={{ flex:1 }} />
          {totalSelected > 0 && <span style={{ fontSize:13, color:"#f4c430" }}>{totalSelected} נבחרו</span>}
          <button onClick={selectAll}  style={aBtn("#2ecc71")}>בחר הכל</button>
          <button onClick={clearAll}   style={aBtn("#e74c3c")}>נקה</button>

          </button>

      </div>

      {/* Match list */}
      <div style={{ padding:"0 16px 100px", maxWidth:800, margin:"0 auto" }}>
        {allDates.map(day => {
          const dayMatches = [
            ...(groupedGroup[day]||[]),

          ].sort((a,b) => etToIdt(a.date,a.etTime).idtTime.localeCompare(etToIdt(b.date,b.etTime).idtTime));

          const todayIDT = new Date(new Date().getTime() + 3 * 3600000).toISOString().slice(0, 10);
          const isToday  = day === todayIDT;
          const d  = new Date(day+"T12:00:00Z");
          const dn = HE_DAYS[d.getUTCDay()];
          const dd = d.getUTCDate();
          const mm = HE_MONTHS[d.getUTCMonth()];

          return (
            <div key={day}>
              <div ref={isToday ? todayRef : null}
                style={{ padding:"12px 0 6px", fontSize:14, fontWeight:700, color: isToday ? "#f4c430" : "#8ba3c4", borderBottom:"1px solid rgba(255,255,255,.06)", marginBottom:8, marginTop:16, display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:16 }}>{isToday ? "📍" : "📅"}</span> יום {dn}, {dd} {mm}{isToday ? " — היום" : ""}
              </div>

              {dayMatches.map(match => {

                const finalScore  = scores[match.id];

                const isSelected  = selected.has(match.id);
                const color       = match.group ? GROUP_COLORS[match.group] : STAGE_COLORS[match.stage];
                const label       = match.group ? `בית ${match.group}` : match.stage;

                return (
                  <div key={match.id}
                    onClick={() => setDetailMatch(match)}
                    style={{
                      display:"flex", alignItems:"center", gap:10, padding:"10px 12px",
                      background: isLive ? "linear-gradient(135deg,rgba(231,76,60,.12),rgba(231,76,60,.04))" : isDone ? "rgba(255,255,255,.02)" : isSelected ? "linear-gradient(135deg,rgba(244,196,48,.15),rgba(244,196,48,.05))" : "rgba(255,255,255,.04)",
                      border: isLive ? "1px solid rgba(231,76,60,.45)" : isDone ? "1px solid rgba(255,255,255,.04)" : isSelected ? "1px solid rgba(244,196,48,.4)" : "1px solid rgba(255,255,255,.06)",

                  >

                    ) : isDone ? (
                      <span style={{ fontSize:11, fontWeight:700, flexShrink:0, color:"#6db86d", width:54, textAlign:"center", background:"rgba(100,180,100,.1)", borderRadius:4, padding:"1px 3px" }}>הסתיים</span>

                    onClick={e => { e.preventDefault(); window.open(makeCalUrl(m), "_blank"); }}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", borderRadius:12, background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.1)", textDecoration:"none", color:"#e8edf5" }}>
                    <span style={{ width:26, height:26, borderRadius:"50%", background:"rgba(244,196,48,.15)", color:"#f4c430", fontSize:13, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{idx+1}</span>
                    <span style={{ fontSize:14, fontWeight:600, flex:1 }}>{m.home} - {m.away}</span>
                    <span style={{ fontSize:12, color:"#8ba3c4", flexShrink:0 }}>{idtTime}</span>
                    <span style={{ fontSize:16, flexShrink:0 }}>📅</span>
                  </a>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Match detail modal ─────────────────────────────────────────────── */}
      {detailMatch && (() => {
        const m = detailMatch;
        const { idtTime, idtDay } = etToIdt(m.date, m.etTime);
        const fScore = scores[m.id];
        const lScore = liveScores[m.id];
        const dDone  = !!fScore;
        const dLive  = !dDone && !!lScore;
        const dScore = fScore || lScore;
        const dColor = m.group ? GROUP_COLORS[m.group] : STAGE_COLORS[m.stage];
        const dLabel = m.group ? "בית " + m.group : m.stage;
        const dObj   = new Date(idtDay + "T12:00:00Z");
        const dName  = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"][dObj.getDay()];
        const monthName = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"][dObj.getMonth()];

        return (
          <div onClick={() => setDetailMatch(null)}
            style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(0,0,0,.7)", backdropFilter:"blur(4px)", display:"flex", alignItems:"center", justifyContent:"center", padding:20, animation:"fadeIn .2s ease" }}>
            <div onClick={e => e.stopPropagation()}
              style={{ background:"linear-gradient(160deg,#16243f,#0d1a2f)", borderRadius:20, border:"1px solid rgba(255,255,255,.12)", maxWidth:440, width:"100%", boxShadow:"0 20px 60px rgba(0,0,0,.5)", overflow:"hidden" }}>

              {/* header band with group + close */}
              <div style={{ background:dColor+"22", borderBottom:"1px solid "+dColor+"44", padding:"14px 18px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <span style={{ padding:"4px 12px", borderRadius:20, fontSize:13, fontWeight:700, background:dColor+"33", color:dColor, border:"1px solid "+dColor+"55" }}>{dLabel}</span>
                <button onClick={() => setDetailMatch(null)}
                  style={{ width:32, height:32, borderRadius:"50%", background:"rgba(255,255,255,.1)", border:"none", color:"#e8edf5", fontSize:17, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
              </div>

              {/* teams + score/time */}
              <div style={{ padding:"24px 18px 18px", textAlign:"center" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:16, marginBottom:8 }}>
                  <span style={{ fontSize:18, fontWeight:700, flex:1, textAlign:"left" }}>{m.away}</span>
                  {(dDone || dLive) ? (
                    <span style={{ fontSize:26, fontWeight:800, color:"#fff", background: dLive?"rgba(231,76,60,.25)":"rgba(255,255,255,.1)", borderRadius:10, padding:"4px 14px", direction:"rtl", unicodeBidi:"isolate", border: dLive?"1px solid rgba(231,76,60,.5)":"none" }}>
                      {dScore.split("-")[0] + " - " + dScore.split("-")[1]}
                    </span>
                  ) : (
                    <span style={{ fontSize:24, fontWeight:800, color: "#f4c430" }}>{idtTime}</span>
                  )}
                  <span style={{ fontSize:18, fontWeight:700, flex:1, textAlign:"right" }}>{m.home}</span>
                </div>
                {dLive && <div style={{ fontSize:13, color:"#e74c3c", fontWeight:700 }}>🔴 משוחק כעת</div>}
                {dDone && <div style={{ fontSize:13, color:"#6db86d", fontWeight:600 }}>המשחק הסתיים</div>}
              </div>

              {/* details list */}
              <div style={{ padding:"0 18px 22px", display:"flex", flexDirection:"column", gap:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"rgba(255,255,255,.04)", borderRadius:"10px 10px 0 0" }}>
                  <span style={{ fontSize:18, width:24, textAlign:"center" }}>📅</span>
                  <span style={{ fontSize:14, color:"#c8d6e8" }}>יום {dName}, {dObj.getUTCDate()} ב{monthName}</span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"rgba(255,255,255,.04)" }}>
                  <span style={{ fontSize:18, width:24, textAlign:"center" }}>🕐</span>
                  <span style={{ fontSize:14, color:"#c8d6e8" }}>{idtTime} (שעון ישראל)</span>
                </div>
                {(() => {
                  const parts = m.venue.split(",");
                  const stadium = parts[0].trim();
                  const city = parts.length > 1 ? parts.slice(1).join(",").trim() : null;
                  return (
                    <>
                      <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"rgba(255,255,255,.04)" }}>
                        <span style={{ fontSize:18, width:24, textAlign:"center" }}>🏟️</span>
                        <span style={{ fontSize:14, color:"#c8d6e8" }}>{stadium}</span>
                      </div>
                      {city && (
                        <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"rgba(255,255,255,.04)" }}>
                          <span style={{ fontSize:18, width:24, textAlign:"center" }}>📍</span>
                          <span style={{ fontSize:14, color:"#c8d6e8" }}>{city}</span>
                        </div>
                      )}
                    </>
                  );
                })()}
                <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"rgba(244,196,48,.08)", borderRadius:"0 0 10px 10px", border:"1px solid rgba(244,196,48,.2)" }}>
                  <span style={{ fontSize:18, width:24, textAlign:"center" }}>📺</span>
                  <span style={{ fontSize:14, color:"#f4d77a", fontWeight:600 }}>כאן 11 · כאן BOX (שידור חינם)</span>
                </div>
              </div>

              {/* add to calendar button (only for upcoming) */}
              {!dDone && !dLive && (
                <div style={{ padding:"0 18px 20px" }}>
                  <button onClick={() => { window.open(makeCalUrl(m), "_blank"); }}
                    style={{ width:"100%", padding:"12px", borderRadius:12, border:"none", background:"linear-gradient(135deg,#f4c430,#e0a800)", color:"#1a1a1a", fontSize:15, fontWeight:700, cursor:"pointer" }}>
                    📅 הוספה ליומן
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Bottom bar */}
      {totalSelected > 0 && view === "schedule" && (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"linear-gradient(135deg,#1a2d4f,#0d1f3a)", borderTop:"1px solid rgba(244,196,48,.3)", padding:"12px 20px", display:"flex", justifyContent:"center", gap:12, alignItems:"center" }}>
          <span style={{ color:"#f4c430", fontWeight:700 }}>{totalSelected} משחקים נבחרו</span>
          <button onClick={openSelected} style={{ background:"linear-gradient(135deg,#f4c430,#e6b800)", color:"#000", fontWeight:800, fontSize:15, border:"none", borderRadius:10, padding:"10px 24px", cursor:"pointer" }}>
            📅 הוספה ליומן
          </button>
          <button onClick={clearAll} style={{ background:"rgba(255,255,255,.08)", color:"#e8edf5", border:"none", borderRadius:10, padding:"10px 16px", cursor:"pointer" }}>נקה</button>
        </div>
      )}

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.45; transform:scale(.75); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      `}</style>
    </div>
  );
}

function fBtn(active, color) {
  return { padding:"6px 12px", borderRadius:20, fontSize:12, fontWeight:600, background: active?color:"rgba(255,255,255,.07)", color: active?"#fff":"#8ba3c4", border: active?`1px solid ${color}`:"1px solid rgba(255,255,255,.12)", cursor:"pointer" };
}
function aBtn(color) {
  return { padding:"7px 14px", borderRadius:8, fontSize:12, fontWeight:600, background:color+"20", color, border:`1px solid ${color}50`, cursor:"pointer" };
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
