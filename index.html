function etToIdt(date, etTime) {
  const [h, m] = etTime.split(":").map(Number);
  const base = new Date(`${date}T${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:00Z`);
  const idt = new Date(base.getTime() + 7 * 3600000);
  return {
    idtDay: idt.toISOString().slice(0, 10),
    idtTime: `${String(idt.getUTCHours()).padStart(2, "0")}:${String(idt.getUTCMinutes()).padStart(2, "0")}`
  };
}
function toIso(date, etTime) {
  const [h, m] = etTime.split(":").map(Number);
  const utcH = h + 4;
  const addDay = utcH >= 24 ? 1 : 0;
  const d = new Date(`${date}T00:00:00Z`);
  d.setUTCDate(d.getUTCDate() + addDay);
  const pad = n => String(n).padStart(2, "0");
  const fmt = (dt, hour) => `${dt.getUTCFullYear()}${pad(dt.getUTCMonth() + 1)}${pad(dt.getUTCDate())}T${pad(hour % 24)}${pad(m)}00Z`;
  const end = new Date(d);
  if (utcH % 24 + 2 >= 24) end.setUTCDate(end.getUTCDate() + 1);
  return {
    startIso: fmt(d, utcH),
    endIso: fmt(end, utcH + 2)
  };
}
function safeParam(s) {
  return String(s).replace(/%/g, "%25").replace(/&/g, "%26").replace(/#/g, "%23").replace(/\+/g, "%2B");
}
function makeCalUrl(match) {
  const title = match.group ? "рҹҸҶ ЧһЧ•Ч Ч“ЧҷЧҗЧң 2026 | " + match.home + " Ч Ч’Ч“ " + match.away + " (Ч‘ЧҷЧӘ " + match.group + ")" : "рҹҸҶ ЧһЧ•Ч Ч“ЧҷЧҗЧң 2026 | " + match.stage + ": " + match.home + " Ч Ч’Ч“ " + match.away;
  const {
    startIso,
    endIso
  } = toIso(match.date, match.etTime);
  return "https://calendar.google.com/calendar/render?action=TEMPLATE" + "&text=" + safeParam(title) + "&dates=" + startIso + "/" + endIso + "&details=" + safeParam("FIFA World Cup 2026 вҖў " + match.venue) + "&location=" + safeParam(match.venue);
}

// в”Җв”Җв”Җ Standings computation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Given the current scores map, compute group standings
function computeStandings(group, scoresMap, liveMap) {
  const matches = GROUP_STAGE.filter(m => m.group === group);
  const teams = {};

  // collect all teams in the group
  matches.forEach(m => {
    [m.home, m.away].forEach(t => {
      if (!teams[t]) teams[t] = {
        name: t,
        mp: 0,
        w: 0,
        d: 0,
        l: 0,
        gf: 0,
        ga: 0,
        pts: 0
      };
    });
  });
  matches.forEach(m => {
    const scoreStr = scoresMap[m.id] || liveMap[m.id];
    if (!scoreStr) return;
    const [hg, ag] = scoreStr.replace(' LIVE', '').split('-').map(Number);
    if (isNaN(hg) || isNaN(ag)) return;
    const home = teams[m.home];
    const away = teams[m.away];
    home.mp++;
    away.mp++;
    home.gf += hg;
    home.ga += ag;
    away.gf += ag;
    away.ga += hg;
    if (hg > ag) {
      home.w++;
      home.pts += 3;
      away.l++;
    } else if (hg < ag) {
      away.w++;
      away.pts += 3;
      home.l++;
    } else {
      home.d++;
      home.pts += 1;
      away.d++;
      away.pts += 1;
    }
  });
  return Object.values(teams).sort((a, b) => b.pts - a.pts || b.gf - b.ga - (a.gf - a.ga) || b.gf - a.gf);
}
